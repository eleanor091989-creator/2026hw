<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職缺 JD｜履歷關鍵字整合推薦系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="jd">
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-badge">HR</div>
        <div class="brand-text">
          <p class="brand-tag">INTERNAL TOOL</p>
          <h1>履歷關鍵字整合推薦系統</h1>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">首頁</a>
        <a href="jd.html" data-nav="jd">職缺 JD</a>
        <a href="resume.html" data-nav="resume">履歷</a>
        <a href="interviewed.html" data-nav="interviewed">已面談</a>
        <a href="not-interviewed.html" data-nav="not-interviewed">未面談</a>
      </nav>
    </div>
  </header>

  <main class="backend-main">
    <div class="container backend-layout">
      <aside class="backend-sidebar">
        <div class="sidebar-card">
          <p class="section-tag">HR BACK OFFICE</p>
          <h2>招募管理後台</h2>
          <p>集中管理職缺、履歷與面談進度，支援本機新增、編輯、刪除。</p>
        </div>

        <div class="sidebar-links">
          <a href="jd.html" data-nav="jd">職缺 JD 管理</a>
          <a href="resume.html" data-nav="resume">履歷管理</a>
          <a href="interviewed.html" data-nav="interviewed">已面談管理</a>
          <a href="not-interviewed.html" data-nav="not-interviewed">未面談管理</a>
        </div>
      </aside>

      <section class="backend-content">
        <div class="page-header">
          <div>
            <p class="section-tag" id="pageTag"></p>
            <h2 id="pageTitle"></h2>
            <p class="page-desc" id="pageDescription"></p>
          </div>
          <button class="btn btn-primary" id="addRecordBtn" type="button">新增資料</button>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="panel">
          <div class="panel-toolbar">
            <input class="panel-input" id="searchInput" type="text" placeholder="搜尋資料" />
            <select class="panel-select" id="statusFilter"></select>
          </div>

          <div class="table-card">
            <table class="data-table">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <p class="section-tag" id="modalTag"></p>
          <h3 id="modalTitle">新增資料</h3>
        </div>
        <button class="icon-btn" id="closeModalBtn" type="button">×</button>
      </div>

      <form id="recordForm" class="form-grid"></form>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelModalBtn" type="button">取消</button>
        <button class="btn btn-primary" id="saveRecordBtn" type="submit" form="recordForm">儲存</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-title">履歷關鍵字整合推薦系統</p>
      <p>本系統僅供公司內部 HR 使用</p>
      <p>如有操作問題，請聯繫人資系統管理單位</p>
    </div>
  </footer>

<script type="module" src="script.js"></script>
  <script>
(function () {
  "use strict";

  const DB_NAME = "resume_local_only_db_v1";
  const DB_VERSION = 1;
  const STORE_NAME = "resumes";
  const RESUME_KEY = "current_resume";
  const MAX_FILE_SIZE = 20 * 1024 * 1024;

  function getText(el) {
    return ((el && (el.innerText || el.textContent || el.value)) || "").trim();
  }

  function isVisible(el) {
    if (!el) return false;

    const style = window.getComputedStyle(el);
    const rect = el.getBoundingClientRect();

    return style.display !== "none" &&
           style.visibility !== "hidden" &&
           rect.width > 0 &&
           rect.height > 0;
  }

  function escapeHTML(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / 1024 / 1024).toFixed(1) + " MB";
  }

  function formatTime(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleString("zh-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function getFileExtension(fileName) {
    const match = String(fileName || "").match(/\.([a-z0-9]+)$/i);
    return match ? match[1].toLowerCase() : "";
  }

  function getFileType(file) {
    if (file.type) return file.type;

    const ext = getFileExtension(file.name);

    if (ext === "pdf") return "application/pdf";
    if (ext === "doc") return "application/msword";
    if (ext === "docx") {
      return "application/vnd.openxmlformats-officedocument.wordprocessingml.document";
    }

    return "application/octet-stream";
  }

  function validateFile(file) {
    if (!file) {
      return "請先選擇履歷檔案。";
    }

    const ext = getFileExtension(file.name);

    if (!["pdf", "doc", "docx"].includes(ext)) {
      return "檔案格式錯誤，請上傳 PDF、DOC 或 DOCX。";
    }

    if (file.size > MAX_FILE_SIZE) {
      return "檔案太大，請上傳 20MB 以下的履歷。";
    }

    return "";
  }

  function openDB() {
    return new Promise(function (resolve, reject) {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = function () {
        const db = request.result;

        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "id" });
        }
      };

      request.onsuccess = function () {
        resolve(request.result);
      };

      request.onerror = function () {
        reject(request.error);
      };
    });
  }

  async function saveResume(record) {
    const db = await openDB();

    return new Promise(function (resolve, reject) {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const request = store.put(record);

      request.onsuccess = function () {
        resolve(record);
      };

      request.onerror = function () {
        reject(request.error);
      };

      tx.oncomplete = function () {
        db.close();
      };
    });
  }

  async function getResume() {
    const db = await openDB();

    return new Promise(function (resolve, reject) {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const request = store.get(RESUME_KEY);

      request.onsuccess = function () {
        resolve(request.result || null);
      };

      request.onerror = function () {
        reject(request.error);
      };

      tx.oncomplete = function () {
        db.close();
      };
    });
  }

  async function deleteResume() {
    const db = await openDB();

    return new Promise(function (resolve, reject) {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const request = store.delete(RESUME_KEY);

      request.onsuccess = function () {
        resolve(true);
      };

      request.onerror = function () {
        reject(request.error);
      };

      tx.oncomplete = function () {
        db.close();
      };
    });
  }

  function findResumeModal() {
    const candidates = Array.from(document.querySelectorAll("div, section, dialog, form"));

    return candidates.find(function (node) {
      const text = getText(node);

      return isVisible(node) &&
             node.querySelector("input[type='file']") &&
             text.includes("上傳履歷") &&
             text.includes("目前狀態");
    }) || null;
  }

  function findStatusSelect(modal) {
    if (!modal) return null;

    const selects = Array.from(modal.querySelectorAll("select"));

    return selects.find(function (select) {
      return Array.from(select.options || []).some(function (option) {
        const text = getText(option);
        return text.includes("已上傳") ||
               text.includes("已面談") ||
               text.includes("未面談");
      });
    }) || selects[0] || null;
  }

  function findMainUploadButton() {
    const buttons = Array.from(
      document.querySelectorAll("button, a, input[type='button'], input[type='submit'], [role='button']")
    );

    return buttons.find(function (button) {
      const text = getText(button);
      return text.includes("上傳履歷") && !button.closest("dialog");
    }) || null;
  }

  function ensurePanel() {
    let panel = document.getElementById("resumeLocalOnlyPanel");

    if (panel) return panel;

    panel = document.createElement("div");
    panel.id = "resumeLocalOnlyPanel";
    panel.style.marginTop = "18px";
    panel.style.padding = "16px 18px";
    panel.style.border = "1px solid #e5e7eb";
    panel.style.borderRadius = "16px";
    panel.style.background = "#ffffff";
    panel.style.color = "#1f2937";
    panel.style.lineHeight = "1.8";
    panel.style.fontFamily = '"Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif';
    panel.style.boxShadow = "0 10px 28px rgba(15, 23, 42, 0.08)";

    const uploadButton = findMainUploadButton();

    if (uploadButton && uploadButton.parentElement) {
      uploadButton.parentElement.insertAdjacentElement("afterend", panel);
    } else {
      document.body.appendChild(panel);
    }

    return panel;
  }

  async function renderResumePanel() {
    const panel = ensurePanel();
    const resume = await getResume();

    if (!resume) {
      panel.innerHTML = "<strong>目前履歷：</strong>尚未上傳";
      return;
    }

    panel.innerHTML =
      "<strong>目前履歷：</strong>" + escapeHTML(resume.fileName) + "<br>" +
      "<strong>檔案大小：</strong>" + escapeHTML(formatBytes(resume.fileSize)) + "<br>" +
      "<strong>目前狀態：</strong>" + escapeHTML(resume.status || "已上傳") + "<br>" +
      "<strong>儲存時間：</strong>" + escapeHTML(formatTime(resume.savedAt)) + "<br>" +
      "<strong>儲存位置：</strong>此瀏覽器本機，不使用 Firebase Storage";
  }

  function ensureActionButtons() {
    if (document.getElementById("resumeLocalDownloadBtn")) return;

    const panel = ensurePanel();

    const wrap = document.createElement("div");
    wrap.id = "resumeLocalActionWrap";
    wrap.style.marginTop = "12px";
    wrap.style.display = "flex";
    wrap.style.gap = "10px";
    wrap.style.flexWrap = "wrap";

    const downloadBtn = document.createElement("button");
    downloadBtn.id = "resumeLocalDownloadBtn";
    downloadBtn.type = "button";
    downloadBtn.textContent = "下載目前履歷";
    downloadBtn.style.padding = "10px 16px";
    downloadBtn.style.borderRadius = "12px";
    downloadBtn.style.border = "1px solid #d1d5db";
    downloadBtn.style.background = "#ffffff";
    downloadBtn.style.cursor = "pointer";
    downloadBtn.style.fontWeight = "700";

    const deleteBtn = document.createElement("button");
    deleteBtn.id = "resumeLocalDeleteBtn";
    deleteBtn.type = "button";
    deleteBtn.textContent = "刪除目前履歷";
    deleteBtn.style.padding = "10px 16px";
    deleteBtn.style.borderRadius = "12px";
    deleteBtn.style.border = "1px solid #d1d5db";
    deleteBtn.style.background = "#ffffff";
    deleteBtn.style.cursor = "pointer";
    deleteBtn.style.fontWeight = "700";

    wrap.appendChild(downloadBtn);
    wrap.appendChild(deleteBtn);

    panel.insertAdjacentElement("afterend", wrap);

    downloadBtn.addEventListener("click", async function () {
      const resume = await getResume();

      if (!resume || !resume.blob) {
        alert("目前沒有可下載的履歷。");
        return;
      }

      const url = URL.createObjectURL(resume.blob);
      const a = document.createElement("a");

      a.href = url;
      a.download = resume.fileName || "resume";
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    });

    deleteBtn.addEventListener("click", async function () {
      const confirmed = confirm("確定要刪除目前儲存的履歷嗎？");

      if (!confirmed) return;

      await deleteResume();

      localStorage.removeItem("resume_file_name");
      localStorage.removeItem("resume_status");
      localStorage.removeItem("resume_saved_at");

      await renderResumePanel();

      alert("履歷已刪除。");
    });
  }

  function setButtonLoading(button, loading) {
    if (!button) return;

    if (loading) {
      button.dataset.originalText = getText(button) || "儲存";
      button.disabled = true;

      if (button.tagName === "INPUT") {
        button.value = "儲存中...";
      } else {
        button.textContent = "儲存中...";
      }
    } else {
      button.disabled = false;

      const originalText = button.dataset.originalText || "儲存";

      if (button.tagName === "INPUT") {
        button.value = originalText;
      } else {
        button.textContent = originalText;
      }
    }
  }

  async function handleSaveClick(event, button) {
    const modal = findResumeModal();

    if (!modal) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    const fileInput = modal.querySelector("input[type='file']");
    const statusSelect = findStatusSelect(modal);

    const file = fileInput && fileInput.files ? fileInput.files[0] : null;
    const status = statusSelect ? statusSelect.value : "已上傳";

    const error = validateFile(file);

    if (error) {
      alert(error);
      return;
    }

    setButtonLoading(button, true);

    try {
      const record = {
        id: RESUME_KEY,
        fileName: file.name,
        fileSize: file.size,
        fileType: getFileType(file),
        status: status || "已上傳",
        blob: file,
        savedAt: new Date().toISOString()
      };

      await saveResume(record);

      localStorage.setItem("resume_file_name", record.fileName);
      localStorage.setItem("resume_status", record.status);
      localStorage.setItem("resume_saved_at", record.savedAt);

      await renderResumePanel();
      ensureActionButtons();

      alert("履歷已儲存成功，不需要 Firebase Storage，也不需要付費。");

      const closeBtn = Array.from(modal.querySelectorAll("button, [role='button']")).find(function (btn) {
        const text = getText(btn);
        return text === "×" || text.includes("取消") || text.includes("關閉");
      });

      if (closeBtn) {
        setTimeout(function () {
          closeBtn.click();
        }, 300);
      }
    } catch (error) {
      console.error("履歷本機儲存失敗：", error);
      alert("儲存失敗，請打開 Console 查看錯誤。");
    } finally {
      setButtonLoading(button, false);
    }
  }

  document.addEventListener("click", function (event) {
    const button = event.target.closest(
      "button, input[type='button'], input[type='submit'], [role='button']"
    );

    if (!button) return;

    const text = getText(button);

    if (!text.includes("儲存")) return;

    const modal = findResumeModal();

    if (!modal) return;

    if (modal.contains(button)) {
      handleSaveClick(event, button);
    }
  }, true);

  document.addEventListener("submit", function (event) {
    const modal = findResumeModal();

    if (!modal) return;

    if (modal.contains(event.target)) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
    }
  }, true);

  async function init() {
    await renderResumePanel();
    ensureActionButtons();
    console.log("履歷上傳已切換成本機儲存版本：不使用 Firebase Storage。");
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
