<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>職缺 JD｜履歷關鍵字整合推薦系統</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-badge">HR</div>
        <div class="brand-text">
          <p class="brand-tag">INTERNAL TOOL</p>
          <h1>履歷關鍵字整合推薦系統</h1>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html">首頁</a>
        <a href="jd.html">職缺 JD</a>
        <a href="resume.html">履歷</a>
        <a href="interviewed.html">已面談</a>
        <a href="not-interviewed.html">未面談</a>
      </nav>
    </div>
  </header>

  <main class="inner-page">
    <section class="section">
      <div class="container">
        <div class="section-heading">
          <p class="section-tag">JOB DESCRIPTION</p>
          <h2>職缺 JD</h2>
          <p>集中管理各職缺需求條件、職務說明與關鍵字設定。</p>
        </div>

        <div class="page-panel">
          <div class="page-toolbar">
            <a class="btn btn-primary" href="#">新增職缺</a>
            <a class="btn btn-secondary" href="#">匯入 JD</a>
          </div>

          <div class="table-card">
            <table class="data-table">
              <thead>
                <tr>
                  <th>職缺名稱</th>
                  <th>部門</th>
                  <th>需求年資</th>
                  <th>關鍵字</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>招募專員</td>
                  <td>人資部</td>
                  <td>2 年以上</td>
                  <td>面談、招募、履歷篩選</td>
                  <td><span class="status-badge active">進行中</span></td>
                </tr>
                <tr>
                  <td>教育訓練專員</td>
                  <td>人資部</td>
                  <td>1 年以上</td>
                  <td>培訓、課程規劃、內訓</td>
                  <td><span class="status-badge pending">待更新</span></td>
                </tr>
                <tr>
                  <td>薪酬福利管理師</td>
                  <td>人資部</td>
                  <td>3 年以上</td>
                  <td>薪資、保險、勞基法</td>
                  <td><span class="status-badge active">進行中</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-title">履歷關鍵字整合推薦系統</p>
      <p>本系統僅供公司內部 HR 使用</p>
      <p>如有操作問題，請聯繫人資系統管理單位</p>
    </div>
  </footer>
</body>
</html>
