<!DOCTYPE html>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-badge">HR</div>
        <div class="brand-text">
          <p class="brand-tag">INTERNAL TOOL</p>
          <h1>履歷關鍵字整合推薦系統</h1>

      </div>

      <nav class="nav">

  <main class="inner-page">
    <section class="section">
      <div class="container">
        <div class="section-heading">
          <p class="section-tag">NOT INTERVIEWED</p>

        </div>

        <div class="page-panel">
          <div class="table-card">
            <table class="data-table">
              <thead>
                <tr>
                  <th>姓名</th>
                  <th>應徵職缺</th>
                  <th>履歷匹配</th>
                  <th>目前進度</th>
                  <th>備註</th>

              </thead>
              <tbody>
                <tr>
                  <td>吳佩蓉</td>
                  <td>招募專員</td>
                  <td>84%</td>
                  <td><span class="status-badge pending">待通知</span></td>

                </tr>
                <tr>
                  <td>周彥廷</td>
                  <td>教育訓練專員</td>
                  <td>79%</td>
                  <td><span class="status-badge pending">待主管確認</span></td>

                </tr>
                <tr>
                  <td>蔡宜庭</td>
                  <td>薪酬福利管理師</td>
                  <td>82%</td>
                  <td><span class="status-badge pending">待聯繫</span></td>
                  <td>可下週安排</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-title">履歷關鍵字整合推薦系統</p>

    </div>
  </footer>
